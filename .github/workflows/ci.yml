name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    env:
      SKILLHUB_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/skillhub_test
      SKILLHUB_TEST_DATABASE_URL: postgresql+psycopg://postgres:postgres@127.0.0.1:5432/skillhub_test
      SKILLHUB_REQUIRE_POSTGRES_TESTS: "1"
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: skillhub_test
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d skillhub_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install API dependencies
        run: python -m pip install -e ".[dev]"

      - name: Upgrade database schema
        run: alembic upgrade head

      - name: Check migration drift
        run: alembic check

      - name: Compile API
        run: python -m compileall -q skillhub skillhub_worker

      - name: Lint API
        run: ruff check skillhub skillhub_worker tests

      - name: Type check ORM schema
        run: mypy skillhub/models/schema

      - name: Run API tests
        run: python -m pytest tests

  web:
    name: Web build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build web
        run: npm run build
